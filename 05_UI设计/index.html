<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic DãLLO Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container neu-outset">
        
        <nav class="top-nav">
            <div class="logo-area neu-inset-circle">
                <i class="fas fa-layer-group"></i> </div>
            <div class="nav-links">
                <a href="#">Features</a>
                <a href="#">Product guide</a>
                <a href="#">Pricing</a>
            </div>
            <div class="search-area neu-inset">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search by">
            </div>
            <div class="profile-area neu-inset-circle">
                <i class="fas fa-user-cog"></i> </div>
        </nav>
        
        <div class="content-wrapper">
            
            <aside class="sidebar">
                
                <div class="clock-module neu-inset">
                    <div class="clock-face neu-inset-circle">
                        <div class="clock-hands">
                            <div class="hand hour"></div>
                            <div class="hand minute"></div>
                        </div>
                        <div class="markers">
                            <div class="marker m12"></div>
                            <div class="marker m3"></div>
                            <div class="marker m6"></div>
                            <div class="marker m9"></div>
                        </div>
                    </div>
                    <div class="clock-text-area">
                        <span class="demo-text">Demo</span>
                        <span class="date-text">06/11</span>
                    </div>
                    <div class="weather-icon-area neu-inset-circle">
                         <i class="fas fa-globe-europe"></i> </div>
                </div>
                
                <div class="status-module neu-inset">
                    <div class="status-item">
                        <div class="item-icon-area neu-inset-circle green-icon"></div>
                        <span class="item-label">Stones</span>
                        <span class="item-stats neu-inset-small">2 / 4 / 7/9</span>
                    </div>
                    <div class="status-item">
                        <div class="item-icon-area neu-inset-circle peach-icon"></div>
                        <span class="item-label">Project 007</span>
                        <span class="item-stats neu-inset-small">0 / 4 / 2/4</span>
                    </div>
                    <div class="status-item">
                        <div class="item-icon-area neu-inset-circle orange-icon"></div>
                        <span class="item-label">Team mates</span>
                        <span class="item-stats neu-inset-small">0 / 0 / 5/8</span>
                    </div>
                </div>
                
                <div class="task-module neu-inset">
                    <div class="pebble-illustration neu-inset-circle">
                         <img src="pebbles_placeholder.png" alt="Tasks illustration">
                    </div>
                    <div class="task-text-area">
                        <h3>Focus on tasks that matter</h3>
                        <a href="#" class="learn-more">Learn more <i class="fas fa-arrow-right"></i></a>
                    </div>
                </div>
                
            </aside>
            
            <main class="main-content-panel neu-inset">
                <div class="panel-header">
                    <h1>DãLLO</h1>
                    <p>Your Balanced Approach to Project Management</p>
                    <a href="#" class="join-link">Join DãLLO <i class="fas fa-arrow-right"></i></a>
                </div>
                
                <div class="stone-stack-image-area">
                    <img src="stone_stack_placeholder.png" alt="Stacked colored stones">
                </div>
                
                <div class="panel-nav">
                    <div class="nav-button neu-inset-circle">
                        <i class="fas fa-arrow-left"></i>
                    </div>
                    <div class="nav-button neu-inset-circle">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
                
            </main>
            
        </div>
        
    </div>

</body>
</html>
